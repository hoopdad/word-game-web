name: CD

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      SHA: ${{ github.event.workflow_run.head_sha }}
      RG: ${{ secrets.RESOURCE_GROUP }}
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      CONTAINER_APP_ENV: ${{ secrets.CONTAINER_APP_ENV }}
      MANAGED_IDENTITY_ID: ${{ secrets.MANAGED_IDENTITY_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set deploy variables
        run: |
          set -euo pipefail
          SHA7="${SHA:0:7}"
          APP_NAME="wordgame-web-v${SHA7}"
          IMAGE_SHA="${ACR_LOGIN_SERVER}/word-game-web:${SHA}"
          IMAGE_LATEST="${ACR_LOGIN_SERVER}/word-game-web:latest"
          echo "SHA7=${SHA7}" >> "$GITHUB_ENV"
          echo "APP_NAME=${APP_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA=${IMAGE_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${IMAGE_LATEST}" >> "$GITHUB_ENV"

      - name: Build and push Docker images
        run: |
          set -euo pipefail
          az acr build --registry "$ACR_NAME" \
            --image "word-game-web:${SHA}" \
            --image "word-game-web:latest" .

      - name: Create SHA-named Container App
        run: |
          set -euo pipefail
          az containerapp create \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --environment "$CONTAINER_APP_ENV" \
            --image "$IMAGE_SHA" \
            --ingress internal \
            --target-port 8080 \
            --min-replicas 0 \
            --max-replicas 3 \
            --user-assigned "$MANAGED_IDENTITY_ID" \
            --registry-server "$ACR_LOGIN_SERVER" \
            --registry-identity "$MANAGED_IDENTITY_ID"

      - name: Wait for app health
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            STATUS="$(az containerapp show -n "$APP_NAME" -g "$RG" --query properties.runningStatus -o tsv)"
            if [ "$STATUS" = "Running" ]; then
              echo "Container app is healthy."
              exit 0
            fi
            echo "Current status: $STATUS (attempt $i/30)"
            sleep 10
          done
          echo "Container app failed to reach Running state."
          exit 1

      - name: Capture FQDN and update Key Vault
        id: capture-fqdn
        run: |
          set -euo pipefail
          NEW_FQDN="$(az containerapp show -n "$APP_NAME" -g "$RG" --query properties.configuration.ingress.fqdn -o tsv)"
          echo "NEW_WEB_FQDN=$NEW_FQDN" >> "$GITHUB_OUTPUT"
          az keyvault secret set --vault-name wordgame-dev-kv --name web-active-fqdn --value "$NEW_FQDN"

      - name: Delete old SHA-named apps
        run: |
          set -euo pipefail
          OLD_APPS="$(az containerapp list -g "$RG" --query "[?starts_with(name, 'wordgame-web-v') && name != '$APP_NAME'].name" -o tsv)"
          if [ -n "$OLD_APPS" ]; then
            echo "$OLD_APPS" | xargs -r -P 4 -I {} az containerapp delete -g "$RG" -n {} --yes
          fi

      - name: Log out
        run: az logout
